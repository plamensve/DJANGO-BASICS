{% extends 'common/base.html' %}

{% block content %}

        <!-- Dashboard Page -->
        <h2>Fruits</h2>
    {% if fruits %}
        <section id="dashboard">
           {% for fruit in fruits %}
        <div class="fruit">
            <img src="{{ fruit.image_url }}" alt="example1" />
            <h3 class="title">{{ fruit.name }}</h3>
            <p class="description">{{ fruit.description|truncatechars:13 }}</p>
            <a class="details-btn" href="#">More Info</a>
        </div>
        {% endfor %}
        </section>
    {% else %}
        <!-- Display a heading if there are no posts -->
        <h2>No fruit info yet.</h2>
    {% endif %}
{% endblock %}
